name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Prepare environment file
        run: cp .env.example .env
      - name: Build and start the stack
        run: docker compose up --build -d
      - name: Wait for the API to be healthy
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://localhost/api/health && exit 0
            sleep 2
          done
          echo "Backend never became healthy" >&2
          docker compose logs
          exit 1
      - name: Install Playwright
        working-directory: e2e
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run e2e suite
        working-directory: e2e
        env:
          SEED_COACH_EMAIL: coach@example.com
          SEED_COACH_PASSWORD: change-me-please
        run: npm test
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
      - name: Tear down the stack
        if: always()
        run: docker compose down

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
